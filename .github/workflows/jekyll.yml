# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow is taken from hfoss2025-blogs' workflow
#
# This workflow has adapted to be build only, since the default GitHub pages
# deployment workflow works here. This workflow exists mainly to run on PRs
# and ensure that they don't break the build before they're merged in.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Build Jekyll Site

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  
  # Runs on PRs targeting the default branch
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        # Docs say to prefer @v1 since the Ruby versions are hardcoded into setup-ruby, and
        # doing this ensures it will always know about current Ruby versions.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
